<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Orchestrator</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #d18616;
    --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
  header .status {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
  }
  header .status.running { color: var(--yellow); }
  header .status.done     { color: var(--green); }
  header .status.error    { color: var(--red); }

  /* ── Main layout ── */
  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Chat panel ── */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message.user {
    align-self: flex-end;
    background: #1f6feb;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message.assistant .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--accent);
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* ── Input bar ── */
  .input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-bar input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--font-sans);
    outline: none;
  }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar input::placeholder { color: var(--text-dim); }

  .input-bar button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .input-bar button:hover { opacity: .85; }
  .input-bar button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Activity panel ── */
  .activity-panel {
    width: 420px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    background: var(--surface);
  }

  .activity-panel h2 {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .timeline {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .event {
    padding: 8px 16px;
    font-size: 12px;
    font-family: var(--font-mono);
    line-height: 1.5;
    border-bottom: 1px solid var(--border);
    animation: fadeIn .25s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .event .label {
    font-weight: 600;
    margin-right: 6px;
  }

  .event .detail {
    color: var(--text-dim);
    margin-left: 18px;
    display: block;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* event type colours */
  .event.run_started .label,
  .event.run_finished .label       { color: var(--green); }
  .event.run_error .label          { color: var(--red); }
  .event.routing_started .label,
  .event.routing_decision .label   { color: var(--accent); }
  .event.enrichment_started .label,
  .event.enrichment_result .label  { color: var(--purple); }
  .event.agent_started .label,
  .event.agent_step .label,
  .event.agent_delegation .label,
  .event.agent_finished .label     { color: var(--yellow); }
  .event.subagent_started .label,
  .event.subagent_step .label,
  .event.subagent_finished .label  { color: var(--orange); }
  .event.tool_call_started .label,
  .event.tool_call_finished .label { color: var(--purple); }
  .event.warning .label            { color: var(--red); }
  .event.hitl_required .label       { color: var(--yellow); }
  .event.hitl_response .label       { color: var(--green); }

  /* ── HITL confirmation dialog ── */
  .hitl-dialog {
    align-self: flex-start;
    max-width: 85%;
    padding: 16px 20px;
    border-radius: 12px;
    background: var(--surface);
    border: 2px solid var(--yellow);
    border-bottom-left-radius: 4px;
    animation: fadeIn .25s ease;
  }

  .hitl-dialog .hitl-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .hitl-dialog .hitl-tool {
    font-size: 14px;
    color: var(--accent);
    font-family: var(--font-mono);
    margin-bottom: 4px;
  }

  .hitl-dialog .hitl-args {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 6px;
    margin: 8px 0 12px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .hitl-dialog .hitl-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .hitl-dialog .hitl-actions button {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .hitl-dialog .hitl-actions button:hover { opacity: .85; }

  .hitl-dialog .hitl-approve {
    background: var(--green);
    color: #fff;
  }

  .hitl-dialog .hitl-approve-session {
    background: var(--accent);
    color: #111;
  }

  .hitl-dialog .hitl-reject {
    background: var(--red);
    color: #fff;
  }

  .hitl-dialog .hitl-resolved {
    font-size: 13px;
    font-weight: 600;
    margin-top: 8px;
  }
  .hitl-dialog .hitl-resolved.approved { color: var(--green); }
  .hitl-dialog .hitl-resolved.rejected { color: var(--red); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .activity-panel { width: 280px; }
  }
  @media (max-width: 640px) {
    .container { flex-direction: column; }
    .activity-panel {
      width: 100%;
      max-height: 40vh;
      border-left: none;
      border-top: 1px solid var(--border);
    }
  }
</style>
</head>
<body>

<header>
  <h1>Agentic Orchestrator</h1>
  <span class="status" id="status">Ready</span>
</header>

<div class="container">
  <!-- Chat -->
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="prompt" placeholder="Type your message..." autofocus />
      <button id="send">Send</button>
    </div>
  </div>

  <!-- Activity timeline -->
  <div class="activity-panel">
    <h2>Activity</h2>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<script>
(function () {
  const messagesEl  = document.getElementById('messages');
  const timelineEl  = document.getElementById('timeline');
  const promptInput = document.getElementById('prompt');
  const sendBtn     = document.getElementById('send');
  const statusEl    = document.getElementById('status');

  let running = false;
  let assistantEl = null;
  let currentSessionId = null;
  let activeHitlDialog = null;
  let activeHitlKey = null;
  let sessionAutoApproved = false;
  const hitlQueue = [];
  const queuedHitlKeys = new Set();

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + (cls || '');
  }

  function scrollBottom(el) {
    el.scrollTop = el.scrollHeight;
  }

  function addUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollBottom(messagesEl);
  }

  function ensureAssistantBubble() {
    if (!assistantEl) {
      assistantEl = document.createElement('div');
      assistantEl.className = 'message assistant';
      assistantEl.innerHTML = '<span class="cursor"></span>';
      messagesEl.appendChild(assistantEl);
    }
    return assistantEl;
  }

  function appendAssistantText(text) {
    const el = ensureAssistantBubble();
    // Remove cursor, append text, re-add cursor
    const cursor = el.querySelector('.cursor');
    if (cursor) cursor.remove();
    el.textContent += text;
    const c = document.createElement('span');
    c.className = 'cursor';
    el.appendChild(c);
    scrollBottom(messagesEl);
  }

  function finalizeAssistant() {
    if (assistantEl) {
      const cursor = assistantEl.querySelector('.cursor');
      if (cursor) cursor.remove();
      assistantEl = null;
    }
  }

  /* ── Friendly event rendering ── */
  const EVENT_LABELS = {
    run_started:        'RUN STARTED',
    run_finished:       'RUN FINISHED',
    run_error:          'ERROR',
    routing_started:    'ROUTING',
    routing_decision:   'ROUTED',
    enrichment_started: 'ENRICHMENT',
    enrichment_result:  'ENRICHED',
    agent_started:      'AGENT START',
    agent_step:         'AGENT STEP',
    agent_delegation:   'DELEGATION',
    agent_finished:     'AGENT DONE',
    subagent_started:   'SUBAGENT START',
    subagent_step:      'SUBAGENT STEP',
    subagent_finished:  'SUBAGENT DONE',
    tool_call_started:  'TOOL CALL',
    tool_call_finished: 'TOOL RESULT',
    hitl_required:      'CONFIRM?',
    hitl_response:      'CONFIRMED',
    token_delta:        'TOKEN',
    warning:            'WARNING',
  };

  function describeEvent(evt) {
    const d = evt.data || {};
    switch (evt.type) {
      case 'run_started':        return d.query ? truncate(d.query, 120) : '';
      case 'run_finished':       return 'Done';
      case 'run_error':          return d.error || 'Unknown error';
      case 'routing_started':    return 'Selecting agent...';
      case 'routing_decision':   return `\u2192 ${d.agent_id}` + (d.task ? `\n  task: ${truncate(d.task, 100)}` : '');
      case 'enrichment_started': return 'Running enrichment...';
      case 'enrichment_result':  return `enricher=${d.enricher_id}  payloads=${d.payload_count}`;
      case 'agent_started':      return `${d.agent_id}`;
      case 'agent_step':         return `step ${d.step}` + (d.thought ? `\n  ${truncate(d.thought, 200)}` : '');
      case 'agent_delegation':   return `${d.agent_id} \u2192 ${d.subagent_id}` + (d.task ? `\n  task: ${truncate(d.task, 100)}` : '');
      case 'agent_finished':     return `${d.agent_id}` + (d.result ? `\n  ${truncate(d.result, 120)}` : '');
      case 'subagent_started':   return d.subagent_id || '';
      case 'subagent_step':      return `step ${d.step}: ${d.action || ''}(${shortArgs(d.arguments)})`;
      case 'subagent_finished':  return d.subagent_id || '';
      case 'tool_call_started':  return `${d.tool}(${shortArgs(d.arguments)})` + (d.source === 'mcp' ? ' [MCP]' : '');
      case 'tool_call_finished': return `${d.tool} \u2192 ${truncate(d.result || '', 120)}`;
      case 'hitl_required':      return `${d.tool}(${shortArgs(d.arguments)})` + (d.source === 'mcp' ? ' [MCP]' : '');
      case 'hitl_response':      return `${d.tool} \u2192 ${d.approved ? 'APPROVED' : 'REJECTED'}` + (d.approval_scope === 'session' ? ' [SESSION]' : '');
      case 'warning':            return d.message || JSON.stringify(d);
      default:                   return JSON.stringify(d);
    }
  }

  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '\u2026' : s; }
  function shortArgs(obj) {
    if (!obj) return '';
    const s = JSON.stringify(obj);
    return truncate(s, 80);
  }

  function addTimelineEvent(evt) {
    if (evt.type === 'token_delta') return; // don't clutter timeline with tokens
    const div = document.createElement('div');
    div.className = 'event ' + evt.type;
    const label = EVENT_LABELS[evt.type] || evt.type.toUpperCase();
    div.innerHTML =
      `<span class="label">[${label}]</span>` +
      `<span class="detail">${escapeHtml(describeEvent(evt))}</span>`;
    timelineEl.appendChild(div);
    scrollBottom(timelineEl);
  }

  function escapeHtml(s) {
    const el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }

  /* ── HITL confirmation UI ── */
  function hitlEventKey(evt) {
    const d = evt.data || {};
    if (d.tool_call_id) return String(d.tool_call_id);
    return JSON.stringify({ tool: d.tool || '', source: d.source || '', arguments: d.arguments || {} });
  }

  function openNextHitlDialog() {
    if (activeHitlDialog || hitlQueue.length === 0) return;

    const queued = hitlQueue.shift();
    const evt = queued.evt;
    const key = queued.key;
    const d = evt.data || {};
    finalizeAssistant(); // close any open assistant bubble

    const dialog = document.createElement('div');
    dialog.className = 'hitl-dialog';
    dialog.innerHTML =
      `<div class="hitl-title">⚠ Tool Confirmation Required</div>` +
      `<div class="hitl-tool">${escapeHtml(d.tool || 'unknown')}</div>` +
      `<div class="hitl-args">${escapeHtml(JSON.stringify(d.arguments || {}, null, 2))}</div>` +
      `<div class="hitl-actions">` +
        `<button class="hitl-approve">Approve Once</button>` +
        `<button class="hitl-approve-session">Approve For Session</button>` +
        `<button class="hitl-reject">Reject</button>` +
      `</div>`;

    messagesEl.appendChild(dialog);
    activeHitlDialog = dialog;
    activeHitlKey = key;
    scrollBottom(messagesEl);

    const approveBtn = dialog.querySelector('.hitl-approve');
    const approveSessionBtn = dialog.querySelector('.hitl-approve-session');
    const rejectBtn = dialog.querySelector('.hitl-reject');
    const actionsEl = dialog.querySelector('.hitl-actions');

    async function respond(approved, approvalScope = 'once') {
      approveBtn.disabled = true;
      approveSessionBtn.disabled = true;
      rejectBtn.disabled = true;

      try {
        await fetch(`/api/session/${currentSessionId}/respond`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            approved,
            approval_scope: approved ? approvalScope : 'once',
            rejection_reason: approved ? null : 'Rejected by user',
          }),
        });

        actionsEl.remove();
        const resolved = document.createElement('div');
        resolved.className = 'hitl-resolved ' + (approved ? 'approved' : 'rejected');
        if (approved && approvalScope === 'session') {
          resolved.textContent = '\u2713 Approved for session';
          sessionAutoApproved = true;
          hitlQueue.length = 0;
          queuedHitlKeys.clear();
        } else {
          resolved.textContent = approved ? '\u2713 Approved once' : '\u2717 Rejected';
          queuedHitlKeys.delete(key);
        }
        dialog.appendChild(resolved);
        if (approved && approvalScope === 'session') {
          queuedHitlKeys.delete(key);
        }
        activeHitlDialog = null;
        activeHitlKey = null;
        openNextHitlDialog();
        setStatus('Running...', 'running');
      } catch (err) {
        let errorEl = dialog.querySelector('.hitl-error');
        if (!errorEl) {
          errorEl = document.createElement('div');
          errorEl.className = 'hitl-error';
          dialog.appendChild(errorEl);
        }
        errorEl.innerHTML = `<span style="color:var(--red)">Failed to submit: ${escapeHtml(err.message)}</span>`;
        approveBtn.disabled = false;
        approveSessionBtn.disabled = false;
        rejectBtn.disabled = false;
      }
    }

    approveBtn.addEventListener('click', () => respond(true, 'once'));
    approveSessionBtn.addEventListener('click', () => respond(true, 'session'));
    rejectBtn.addEventListener('click', () => respond(false));

    setStatus('Waiting for confirmation...', 'running');
  }

  function showHitlDialog(evt) {
    if (sessionAutoApproved) return;
    const key = hitlEventKey(evt);
    if (queuedHitlKeys.has(key)) return;
    queuedHitlKeys.add(key);
    hitlQueue.push({ evt, key });
    openNextHitlDialog();
  }

  /* ── Send & stream ── */
  async function send() {
    const query = promptInput.value.trim();
    if (!query || running) return;
    running = true;
    sendBtn.disabled = true;
    promptInput.value = '';
    activeHitlDialog = null;
    activeHitlKey = null;
    sessionAutoApproved = false;
    hitlQueue.length = 0;
    queuedHitlKeys.clear();

    addUserMessage(query);
    setStatus('Running...', 'running');

    try {
      const resp = await fetch('/api/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });

      // Capture session ID from response header
      currentSessionId = resp.headers.get('X-Session-Id');

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Parse SSE lines
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const evt = JSON.parse(line.slice(6));
            handleEvent(evt);
          } catch (_) { /* ignore malformed */ }
        }
      }
    } catch (err) {
      addTimelineEvent({ type: 'run_error', data: { error: err.message } });
      setStatus('Error', 'error');
    }

    finalizeAssistant();
    if (statusEl.textContent === 'Running...') setStatus('Done', 'done');
    running = false;
    sendBtn.disabled = false;
    promptInput.focus();
  }

  function handleEvent(evt) {
    addTimelineEvent(evt);

    if (evt.type === 'token_delta' && evt.data && evt.data.content) {
      appendAssistantText(evt.data.content);
    }
    if (evt.type === 'hitl_required') {
      showHitlDialog(evt);
    }
    if (evt.type === 'run_finished') {
      setStatus('Done', 'done');
    }
    if (evt.type === 'run_error') {
      setStatus('Error', 'error');
      appendAssistantText('\n\n[Error: ' + (evt.data.error || 'unknown') + ']');
    }
  }

  sendBtn.addEventListener('click', send);
  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
})();
</script>
</body>
</html>
