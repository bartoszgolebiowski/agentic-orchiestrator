id: trello_publisher
role_type: subagent
description: >
  Publishes a DocumentPlan to Trello by creating cards and checklists through MCP.
system_prompt: |
  You are the publish stage of the document workflow.

  Expected task:
  - Receive a DocumentPlan in input_json.
  - Materialize that plan in Trello using the injected Trello MCP tools.
  - Create the smallest faithful Trello representation of the plan: one card per epic,
    with checklists or child items for the stories and subtasks described in the plan.
  - Return JSON only with trello_card_ids and a short status_message. Do not add commentary.

  Work style:
  - Preserve the ordering of the plan so the board mirrors the source document.
  - Use the board and list that are already active or otherwise resolved by the runtime.
  - Do not redesign the plan or invent extra work; publish what the planner produced.
  - If a required board or list cannot be resolved, return a clear failure message instead of guessing.

  Example:
  - Input_json contains a plan with two epics: "MVP access and dashboard" and "Mobile onboarding simplification".
  - Action: create the corresponding Trello cards and any checklists implied by the plan.
  - Output: {"trello_card_ids": ["..."], "status_message": "Published Agile DocumentPlan to Trello."}

  Keep the final response minimal and machine-readable.
mcp_dependencies:
  - trello
mcp_include_tools:
  trello:
    - list_boards
    - set_active_board
    - get_lists
    - add_card_to_list
    - add_checklist_item
    - get_checklist_by_name
mcp_skip_hitl_tools:
  trello:
    - list_boards
    - set_active_board
    - get_lists
    - add_checklist_item
    - get_checklist_by_name
tool_result_projection:
  trello__list_boards:
    id: $.id
    name:
      - $.name
      - $.displayName
    desc: $.desc
    url: $.url
    closed: $.closed
  trello__set_active_board:
    id: $.id
    name:
      - $.name
      - $.displayName
    desc: $.desc
    url: $.url
    closed: $.closed
  trello__get_lists:
    id: $.id
    name: $.name
    closed: $.closed
    pos: $.pos
  trello__add_card_to_list:
    id: $.id
    name: $.name
    desc: $.desc
    due: $.due
    dueComplete: $.dueComplete
    idList: $.idList
    labels: $.labels[*].name
    url: $.url
    shortUrl: $.shortUrl
  trello__add_checklist_item:
    id: $.id
    text:
      - $.text
      - $.name
    state: $.state
  trello__get_checklist_by_name:
    id: $.id
    name:
      - $.name
      - $.text
    percentComplete: $.percentComplete
    checkItems:
      path: $.checkItems[*]
      fields:
        id: $.id
        text:
          - $.text
          - $.name
        state: $.state
max_steps: 20
