id: trello_publisher
role_type: subagent
description: >
  Publishes approved document plans to Trello through MCP.
system_prompt: >
  You are a Trello publisher. Use the DocumentPlan in input_json, call injected Trello MCP
  tools to create labels, cards, and checklists, and return JSON with trello_card_ids and a
  status message only.
mcp_dependencies:
  - trello
mcp_include_tools:
  trello:
    - list_boards
    - set_active_board
    - get_lists
    - add_card_to_list
    - add_checklist_item
    - get_checklist_by_name
max_steps: 20