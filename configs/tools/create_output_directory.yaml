id: create_output_directory
description: "Creates an output directory for a transcript analysis run, including action-points subdirectory. Returns the path."
parameters:
  base_dir:
    type: string
    description: "Base output directory (e.g. 'output')."
    required: true
  transcript_id:
    type: string
    description: "Unique identifier for this transcript (timestamp-based)."
    required: true
